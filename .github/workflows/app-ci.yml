name: App CI — Tests

# Runs the application test suite on every pull request, so app changes are
# gated before merge (the deploy workflow re-runs them on push to main).
on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies and run tests
        run: |
          pip install -r requirements.txt pytest --quiet
          python -m pytest tests/ -v --tb=short
