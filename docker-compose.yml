# Local-only stack for learning / developing the RabbitMQ avatar pipeline.
# Mirrors the cloud topology (Flask producer -> RabbitMQ -> worker -> S3 -> DB)
# but runs entirely offline: Postgres replaces RDS and MinIO replaces S3, so
# there is zero AWS cost and no credentials required.
#
#   docker compose up --build
#   open http://localhost:5000        (app)
#   open http://localhost:15672       (RabbitMQ UI: app / app)
#   open http://localhost:9001        (MinIO console: minioadmin / minioadmin)
#
# Upload an avatar in the app, watch the worker logs generate the thumbnail,
# then fetch it at /api/profiles/<id>/avatar?size=thumb.

x-app-env: &app-env
  DATABASE_URL: postgresql+psycopg2://app:app@postgres:5432/appdb
  AVATAR_BUCKET: avatars
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_USER: app
  RABBITMQ_PASSWORD: app
  # Point boto3 at MinIO instead of real S3.
  AWS_ENDPOINT_URL: http://minio:9000
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  AWS_DEFAULT_REGION: us-east-1

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: appdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: app
      RABBITMQ_DEFAULT_PASS: app
    ports:
      - "15672:15672"   # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9001:9001"     # web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the avatars bucket in MinIO, then exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/avatars &&
      echo 'bucket ready'
      "

  web:
    build: .
    environment:
      <<: *app-env
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  worker:
    build: .
    # Override the gunicorn entrypoint to run the consumer instead.
    entrypoint: ["python", "-u", "worker.py"]
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
